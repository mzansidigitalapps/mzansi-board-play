plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mzansi.boardplay'
    compileSdk 34

    defaultConfig {
        applicationId "com.mzansi.boardplay"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.gms:play-services-ads:22.6.0'
}
